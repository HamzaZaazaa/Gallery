<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Memories</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        html {
            height: -webkit-fill-available;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #f0fdf4, #e0f2fe);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            touch-action: manipulation; 
        }

        body.modal-open {
            overflow: hidden;
        }

        header {
            margin-top: 2rem;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            color: #166534;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #15803d;
            font-size: 1rem;
            margin-top: 0;
        }

        .garden {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 2rem;
            flex-wrap: wrap;
            padding: 20px 20px 40px;
            max-width: 100%;
        }

        .flower {
            position: relative;
            width: 80px;
            height: 80px;
            cursor: pointer;
            transform: translateZ(0); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower:hover, .flower:active {
            transform: scale(1.1) rotate(15deg);
        }

        .petal {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.05);
        }

        .p1 { top: 0; left: 25px; }
        .p2 { top: 15px; left: 45px; }
        .p3 { top: 40px; left: 35px; }
        .p4 { top: 40px; left: 10px; }
        .p5 { top: 15px; left: 0px; }

        .flower-center {
            position: relative; 
            width: 35px;
            height: 35px;
            border-radius: 50%;
            z-index: 10;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
        }

        /* 8 Distinct Flower Colors */
        .flower-1 .petal { background: #e63946; } .flower-1 .flower-center { background: #f1faee; }
        .flower-2 .petal { background: #ffbe0b; } .flower-2 .flower-center { background: #d9ae80; }
        .flower-3 .petal { background: #fefae0; } .flower-3 .flower-center { background: #fdfd96; }
        .flower-4 .petal { background: #fb5607; } .flower-4 .flower-center { background: #f9dc5c; }
        .flower-5 .petal { background: #8338ec; } .flower-5 .flower-center { background: #f9dc5c; }
        .flower-6 .petal { background: #ff006e; } .flower-6 .flower-center { background: #f9dc5c; }
        .flower-7 .petal { background: #00b4d8; } .flower-7 .flower-center { background: #caf0f8; }
        .flower-8 .petal { background: #03045e; } .flower-8 .flower-center { background: #caf0f8; }

        .modal {
            display: none; 
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow-y: auto; 
            padding: 20px;
        }

        .modal.show {
            opacity: 1;
        }

        .modal-content {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 0;
            max-width: 90%;
            max-height: 90vh; 
            text-align: center;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            border-radius: 16px;
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            width: 100%;
            max-height: 70vh; 
            display: block;
            object-fit: contain; 
        }

        .modal-details {
            padding: 20px;
            text-align: left;
        }

        .modal-title {
            margin-top: 0;
            color: #166534;
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .modal-description {
            margin-bottom: 0;
            color: #15803d;
            font-size: 1rem;
            line-height: 1.4;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 26px;
            line-height: 40px; 
            text-align: center;
            padding: 0;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 101;
            transition: background 0.2s ease;
        }

        .close-btn:active {
            background: rgba(220, 38, 38, 1);
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Flower Garden</h1>
        <p>Tap a flower to open a memory...</p>
    </header>

    <div class="garden">
        <div class="flower flower-1" onclick="showImage(0)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-2" onclick="showImage(1)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-3" onclick="showImage(2)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-4" onclick="showImage(3)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-5" onclick="showImage(4)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-6" onclick="showImage(5)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-7" onclick="showImage(6)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
        <div class="flower flower-8" onclick="showImage(7)">
            <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="flower-center"></div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <img id="popupImage" src="" alt="Memory">
            <div class="modal-details">
                <h2 id="modalTitle" class="modal-title"></h2>
                <p id="modalDescription" class="modal-description"></p>
            </div>
        </div>
    </div>

    <script>
        // EXACTLY 8 IMAGES, HARDCODED TO YOUR FILENAMES
        const flowerPhotos = [
            { url: "pic1.jpg", title: "A Great Day", description: "One of my favorite moments with you." },
            { url: "pic2.jpg", title: "Just Us", description: "Love looking back at this one." },
            { url: "pic3.jpg", title: "Adventures", description: "Always the best time when we are together." },
            { url: "pic4.jpg", title: "Beautiful", description: "You looked amazing here." },
            { url: "pic5.jpg", title: "Laughs", description: "I still remember how much we were laughing." },
            { url: "pic6.jpg", title: "Special Trip", description: "Take me back to this day." },
            { url: "pic7.jpg", title: "Perfect Memory", description: "Everything about this was perfect." },
            { url: "pic8.jpg", title: "Us", description: "Can't wait to make more memories like this." }
        ];

        function showImage(index) {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("popupImage");
            const modalTitle = document.getElementById("modalTitle");
            const modalDesc = document.getElementById("modalDescription");
            
            if (index < 0 || index >= flowerPhotos.length) return;

            modalImg.src = "";
            modalTitle.textContent = "";
            modalDesc.textContent = "";

            const photoData = flowerPhotos[index];
            modalImg.src = photoData.url;
            modalTitle.textContent = photoData.title;
            modalDesc.textContent = photoData.description;
            
            modal.style.display = "flex";
            document.body.classList.add("modal-open");
            
            setTimeout(() => {
                modal.classList.add("show");
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("popupImage");
            
            modal.classList.remove("show");
            
            setTimeout(() => {
                modal.style.display = "none";
                modalImg.src = ""; 
                document.body.classList.remove("modal-open");
            }, 300); 
        }
    </script>
</body>
    
</html>
