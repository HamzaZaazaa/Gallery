<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Flower Garden</title>
    <style>
        /* Reset and iOS specific optimizations */
        * {
            box-sizing: border-box;
            /* Removes the default gray tap highlight on iOS */
            -webkit-tap-highlight-color: transparent; 
        }

        html {
            /* Helps with iOS Safari's bottom toolbar layout issues */
            height: -webkit-fill-available;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #e0f2fe, #f0fdf4);
            /* Uses native Apple system fonts for a cleaner look on iPhone */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            /* Removes the 300ms tap delay on mobile */
            touch-action: manipulation; 
        }

        /* Freezes background scrolling when the modal is open */
        body.modal-open {
            overflow: hidden;
        }

        h1 {
            color: #4338ca;
            margin-top: 2rem;
            text-align: center;
            font-size: 1.5rem;
            padding: 0 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Container for the flowers */
        .garden {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 2rem;
            flex-wrap: wrap;
            padding: 20px;
            max-width: 100%;
        }

        /* Flower styling */
        .flower {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
            /* Hardware acceleration for smoother iOS animations */
            transform: translateZ(0); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hover works on desktop, active works on touch (iPhone) */
        .flower:hover, .flower:active {
            transform: scale(1.1) rotate(15deg);
        }

        .petal {
            position: absolute;
            background: #f43f5e; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
        }

        /* Position petals around the center */
        .p1 { top: 0; left: 30px; }
        .p2 { top: 20px; left: 55px; }
        .p3 { top: 50px; left: 45px; }
        .p4 { top: 50px; left: 15px; }
        .p5 { top: 20px; left: 5px; }

        .flower-center {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            background: #fef08a; 
            border-radius: 50%;
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(255,165,0,0.5);
        }

        /* Different flower colors */
        .flower.blue .petal { background: #3b82f6; }
        .flower.purple .petal { background: #a855f7; }

        /* The Modal (Pop-up box for the image) */
        .modal {
            display: none; 
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            /* iOS backdrop blur effect for a premium feel */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
        }

        .modal-content {
            background-color: transparent;
            padding: 0;
            max-width: 90%;
            max-height: 80vh;
            text-align: center;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 12px;
            display: block;
            object-fit: contain;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Optimized for Apple Touch Target Guidelines (min 44x44px) */
        .close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #ef4444;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 24px;
            line-height: 40px;
            text-align: center;
            padding: 0;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 101;
        }
    </style>
</head>
<body>

    <h1>Pick a flower to reveal a memory...</h1>

    <div class="garden">
        <div class="flower" onclick="showImage(0)">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>

        <div class="flower blue" onclick="showImage(1)">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>

        <div class="flower purple" onclick="showImage(2)">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="flower-center"></div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <img id="popupImage" src="" alt="Flower Memory">
        </div>
    </div>

    <script>
        // Ensure your exact file names are listed here
        const flowerImages = [
            "pic1.jpg", 
            "pic2.png", 
            "pic3.jpg"  
        ];

        function showImage(index) {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("popupImage");
            
            // Set the image
            modalImg.src = flowerImages[index];
            
            // Display modal and lock background scrolling (Crucial for iOS)
            modal.style.display = "flex";
            document.body.classList.add("modal-open");
            
            // Slight delay for smooth fade-in animation
            setTimeout(() => {
                modal.classList.add("show");
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById("imageModal");
            
            // Start fade-out animation
            modal.classList.remove("show");
            
            // Unlock background scrolling
            document.body.classList.remove("modal-open");
            
            // Wait for fade out to finish before hiding completely
            setTimeout(() => {
                modal.style.display = "none";
                document.getElementById("popupImage").src = ""; // Clear image
            }, 300);
        }
    </script>
</body>
</html>
